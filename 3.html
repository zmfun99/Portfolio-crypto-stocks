<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/customize.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
    <style>
      body {
        background-image: url('css/background.jpg');
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        font-family: Helvetica, sans-serif;
        color: white;
        min-height: 100vh;
        height: auto;
        padding: 30px 20px 60px;
        box-sizing: border-box;
        overflow-y: auto;
      }

      .logo2 { position: fixed; top: 10px; right: 10px; z-index: 100; }

      .page-title {
        text-align: center;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 1px;
        text-shadow: 0 0 20px rgba(140,70,255,0.6);
        margin-bottom: 24px;
      }

      .card {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 16px;
        padding: 20px 24px;
        box-sizing: border-box;
      }

      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 20px;
        max-width: 1300px;
        margin: 0 auto;
      }

      .left-panel { display: flex; flex-direction: column; gap: 14px; }

      .panel-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        margin-bottom: 12px;
      }

      .mode-toggle {
        display: flex;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 14px;
      }

      .mode-btn {
        flex: 1;
        padding: 8px 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        border: none;
        background: transparent;
        color: rgba(255,255,255,0.4);
        cursor: pointer;
        transition: all 0.15s;
      }

      .mode-btn.active {
        background: rgba(140,70,255,0.3);
        color: white;
      }

      .add-row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .ticker-input {
        flex: 1;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 8px;
        color: white;
        font-size: 13px;
        font-weight: 700;
        padding: 8px 12px;
        text-transform: uppercase;
        outline: none;
      }

      .ticker-input::placeholder { color: rgba(255,255,255,0.25); text-transform: none; }
      .ticker-input:focus { border-color: rgba(140,70,255,0.5); }

      .add-btn {
        background: rgba(140,70,255,0.25);
        border: 1px solid rgba(140,70,255,0.4);
        border-radius: 8px;
        color: white;
        font-size: 13px;
        font-weight: 700;
        padding: 8px 14px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .add-btn:hover { background: rgba(140,70,255,0.45); }

      .coin-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .coin-ticker {
        width: 62px;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .coin-slider {
        flex: 1;
        accent-color: rgb(140,70,255);
        cursor: pointer;
        min-width: 0;
      }

      .coin-number {
        width: 72px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 6px;
        color: white;
        font-size: 12px;
        font-weight: 700;
        padding: 4px 8px;
        text-align: right;
        outline: none;
        flex-shrink: 0;
      }

      .coin-number:focus { border-color: rgba(140,70,255,0.5); }

      .coin-unit {
        font-size: 11px;
        color: rgba(255,255,255,0.4);
        width: 26px;
        flex-shrink: 0;
      }

      .remove-btn {
        background: none;
        border: none;
        color: rgba(255,100,100,0.5);
        font-size: 16px;
        cursor: pointer;
        padding: 0 2px;
        transition: color 0.15s;
        flex-shrink: 0;
      }
      .remove-btn:hover { color: rgba(255,100,100,1); }

      .total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 10px;
        border-top: 1px solid rgba(255,255,255,0.1);
        margin-top: 4px;
      }

      .total-label {
        font-size: 11px;
        font-weight: 700;
        color: rgba(255,255,255,0.45);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .total-value { font-size: 17px; font-weight: 900; }
      .total-ok  { color: #2ecc71; }
      .total-warn { color: #e74c3c; }

      .period-row { display: flex; gap: 8px; flex-wrap: wrap; }

      .period-btn {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.13);
        border-radius: 8px;
        color: rgba(255,255,255,0.6);
        font-size: 12px;
        font-weight: 700;
        padding: 6px 14px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 1px;
      }

      .period-btn:hover, .period-btn.active {
        background: rgba(140,70,255,0.3);
        border-color: rgba(140,70,255,0.6);
        color: white;
      }

      .run-btn {
        width: 100%;
        padding: 14px;
        background: rgba(140,70,255,0.25);
        border: 1px solid rgba(140,70,255,0.5);
        border-radius: 12px;
        color: white;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }

      .run-btn:hover:not(:disabled) {
        background: rgba(140,70,255,0.45);
        transform: translateY(-2px);
      }

      .run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

      .metrics-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .metric-box {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: 10px;
        padding: 10px 14px;
        text-align: center;
      }

      .metric-label {
        font-size: 9px;
        color: rgba(255,255,255,0.4);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }

      .metric-value { font-size: 18px; font-weight: 900; }
      .positive { color: #2ecc71; }
      .negative { color: #e74c3c; }
      .neutral  { color: #87ceeb; }

      .right-panel { display: flex; flex-direction: column; gap: 14px; }

      .charts-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .chart-box {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 16px;
        overflow: hidden;
        height: 260px;
        box-sizing: border-box;
        padding: 4px;
      }

      .chart-box.full { grid-column: 1 / -1; height: 280px; }

      .chart-box > div {
        width: 100% !important;
        height: 100% !important;
      }

      .placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: rgba(255,255,255,0.18);
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .status-msg {
        text-align: center;
        font-size: 12px;
        color: rgba(255,255,255,0.4);
        letter-spacing: 1px;
        min-height: 20px;
      }

      .error-msg { color: #e74c3c; }

      @media (max-width: 960px) {
        .layout { grid-template-columns: 1fr; }
        .charts-row { grid-template-columns: 1fr; }
        .chart-box.full { grid-column: 1; }
      }
    </style>
  </head>

  <body>
    <a class="logo2" href="index.html"></a>

    <h1 class="page-title">Portfolio Simulator</h1>

    <div class="layout">

      <div class="left-panel">

        <div class="card">
          <div class="panel-title">Input Mode</div>
          <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('pct')">% Allocation</button>
            <button class="mode-btn" onclick="setMode('usd')">USD Amount</button>
          </div>

          <div class="panel-title">Add Asset</div>
          <div class="add-row">
            <input class="ticker-input" id="ticker-input" type="text"
              placeholder="e.g. BTC or AAPL"
              onkeydown="if(event.key==='Enter') addCoin()">
            <button class="add-btn" onclick="addCoin()">+ Add</button>
          </div>

          <div id="coin-list"></div>

          <div class="total-row">
            <span class="total-label" id="total-label">Total</span>
            <span class="total-value total-warn" id="total-display">0%</span>
          </div>
        </div>

        <div class="card">
          <div class="panel-title">Time Period</div>
          <div class="period-row">
            <button class="period-btn active" data-p="3mo">3M</button>
            <button class="period-btn" data-p="6mo">6M</button>
            <button class="period-btn" data-p="1y">1Y</button>
            <button class="period-btn" data-p="2y">2Y</button>
            <button class="period-btn" data-p="5y">5Y</button>
            <button class="period-btn" data-p="max">Max</button>
          </div>
        </div>

        <button class="run-btn" id="run-btn" onclick="runAnalysis()">
          Analyse Portfolio
        </button>

        <div class="status-msg" id="status-msg"></div>

        <div class="card" id="metrics-card" style="display:none;">
          <div class="panel-title">Portfolio Metrics</div>
          <div class="metrics-grid" id="metrics-grid"></div>
        </div>

      </div>

      <div class="right-panel">
        <div class="charts-row">
          <div class="chart-box full" id="box-1">
            <div class="placeholder">Run analysis to see charts</div>
          </div>
          <div class="chart-box" id="box-4">
            <div class="placeholder">Weights</div>
          </div>
          <div class="chart-box" id="box-3">
            <div class="placeholder">Rolling Volatility</div>
          </div>
          <div class="chart-box full" id="box-5">
            <div class="placeholder">Drawdown</div>
          </div>
        </div>
      </div>

    </div>

    <script>
      let coins = [];
      let mode = 'pct';
      let selectedPeriod = '3mo';

      const COLORS = ['#636EFA','#EF553B','#00CC96','#AB63FA','#FFA15A',
                      '#19D3F3','#FF6692','#B6E880','#FF97FF','#FECB52'];

      document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedPeriod = btn.dataset.p;
        });
      });

      function setMode(m) {
        mode = m;
        document.querySelectorAll('.mode-btn').forEach((b, i) => {
          b.classList.toggle('active', (i === 0 && m === 'pct') || (i === 1 && m === 'usd'));
        });
        renderCoins();
        updateTotal();
      }

      function addCoin() {
        const input = document.getElementById('ticker-input');
        let ticker = input.value.trim().toUpperCase();
        if (!ticker) return;
        if (!ticker.includes('-') && !ticker.match(/^\^/)) ticker += '-USD';
        if (coins.find(c => c.ticker === ticker)) {
          setStatus(ticker + ' is already added.', true);
          return;
        }
        coins.push({ ticker, color: COLORS[coins.length % COLORS.length] });
        input.value = '';
        renderCoins();
        updateTotal();
        setStatus('');
      }

      function removeCoin(ticker) {
        coins = coins.filter(c => c.ticker !== ticker);
        renderCoins();
        updateTotal();
      }

      function renderCoins() {
        const list = document.getElementById('coin-list');
        list.innerHTML = '';
        coins.forEach(c => {
          const row = document.createElement('div');
          row.className = 'coin-row';
          if (mode === 'pct') {
            row.innerHTML = `
              <span class="coin-ticker" style="color:${c.color}">${c.ticker.replace('-USD','')}</span>
              <input class="coin-slider" type="range" min="0" max="100" value="0"
                id="slider-${c.ticker}" oninput="syncSlider('${c.ticker}')">
              <input class="coin-number" type="number" min="0" max="100" value="0"
                id="num-${c.ticker}" oninput="syncNumber('${c.ticker}')">
              <span class="coin-unit">%</span>
              <button class="remove-btn" onclick="removeCoin('${c.ticker}')">✕</button>
            `;
          } else {
            row.innerHTML = `
              <span class="coin-ticker" style="color:${c.color}">${c.ticker.replace('-USD','')}</span>
              <input class="coin-number" type="number" min="0" value="0" style="width:100px"
                id="num-${c.ticker}" oninput="updateTotal()">
              <span class="coin-unit">$</span>
              <button class="remove-btn" onclick="removeCoin('${c.ticker}')">✕</button>
            `;
          }
          list.appendChild(row);
        });
      }

      function syncSlider(ticker) {
        const s = document.getElementById('slider-' + ticker);
        const n = document.getElementById('num-' + ticker);
        n.value = s.value;
        updateTotal();
      }

      function syncNumber(ticker) {
        const n = document.getElementById('num-' + ticker);
        const s = document.getElementById('slider-' + ticker);
        const v = Math.min(100, Math.max(0, parseFloat(n.value) || 0));
        n.value = v;
        if (s) s.value = v;
        updateTotal();
      }

      function updateTotal() {
        let total = 0;
        coins.forEach(c => {
          total += parseFloat(document.getElementById('num-' + c.ticker)?.value || 0);
        });
        const el = document.getElementById('total-display');
        const label = document.getElementById('total-label');
        if (mode === 'pct') {
          el.textContent = total.toFixed(1) + '%';
          label.textContent = 'Total';
          el.className = 'total-value ' + (Math.abs(total - 100) < 0.5 ? 'total-ok' : 'total-warn');
        } else {
          el.textContent = '$' + total.toLocaleString(undefined, { maximumFractionDigits: 2 });
          label.textContent = 'Total Invested';
          el.className = 'total-value total-ok';
        }
      }

      function getPayload() {
        let totalRaw = 0;
        const raw = {};
        coins.forEach(c => {
          const v = parseFloat(document.getElementById('num-' + c.ticker)?.value || 0);
          if (v > 0) { raw[c.ticker] = v; totalRaw += v; }
        });
        if (totalRaw === 0) return null;
        const tickers = Object.keys(raw);
        const weights = tickers.map(t => raw[t] / totalRaw);
        return { tickers, weights, period: selectedPeriod };
      }

      function setStatus(msg, isError) {
        const el = document.getElementById('status-msg');
        el.textContent = msg;
        el.className = 'status-msg' + (isError ? ' error-msg' : '');
      }

      function injectChart(boxId, html) {
        const box = document.getElementById(boxId);
        box.innerHTML = html;
        const scripts = box.querySelectorAll('script');
        scripts.forEach(old => {
          const s = document.createElement('script');
          s.textContent = old.textContent;
          old.parentNode.replaceChild(s, old);
        });
      }

      function renderMetrics(m) {
        const sign = v => v >= 0 ? '+' : '';
        const items = [
          { label: 'Annualized Return',    value: sign(m.ann_ret) + m.ann_ret + '%',        cls: m.ann_ret >= 0 ? 'positive' : 'negative' },
          { label: 'Annualized Volatility',value: m.ann_vol + '%',                           cls: 'neutral' },
          { label: 'Sharpe Ratio',         value: '' + m.sharpe,                             cls: m.sharpe >= 1 ? 'positive' : m.sharpe >= 0 ? 'neutral' : 'negative' },
          { label: 'Beta vs S&P500',       value: '' + m.beta,                               cls: 'neutral' },
          { label: 'Max Drawdown',         value: m.max_drawdown + '%',                      cls: 'negative' },
          { label: 'Best Day',             value: sign(m.best_day) + m.best_day + '%',       cls: 'positive' },
          { label: 'Worst Day',            value: m.worst_day + '%',                         cls: 'negative' },
          { label: 'Period',               value: selectedPeriod.toUpperCase(),               cls: 'neutral' },
        ];
        document.getElementById('metrics-grid').innerHTML = items.map(i => `
          <div class="metric-box">
            <div class="metric-label">${i.label}</div>
            <div class="metric-value ${i.cls}">${i.value}</div>
          </div>
        `).join('');
        document.getElementById('metrics-card').style.display = 'block';
      }

      async function runAnalysis() {
        const payload = getPayload();
        if (!payload) {
          setStatus('Add at least one asset and set an allocation.', true);
          return;
        }
        const btn = document.getElementById('run-btn');
        btn.disabled = true;
        btn.textContent = 'Running...';
        setStatus('Fetching data and computing...');

        try {
          const res = await fetch('/api/analyse', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json();

          if (data.error) {
            setStatus('Error: ' + data.error, true);
          } else {
            injectChart('box-1', data.chart1);
            injectChart('box-4', data.chart4);
            injectChart('box-3', data.chart3);
            injectChart('box-5', data.chart5);
            renderMetrics(data);
            setStatus('');
          }
        } catch (e) {
          setStatus('Could not reach server. Is app.py running?', true);
        }

        btn.disabled = false;
        btn.textContent = 'Analyse Portfolio';
      }
    </script>
  </body>
</html>
