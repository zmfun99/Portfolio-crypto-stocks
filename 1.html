<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/customize.css">
    <style>
      body.dashboard {
        background-image: url('css/background.jpg');
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 16px;
        padding: 16px;
        box-sizing: border-box;
      }

      body.dashboard .logo2 {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 10;
      }

      body.dashboard div {
        position: relative;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 14px;
        overflow: hidden;
        transition: border-color 0.2s, transform 0.2s;
      }

      body.dashboard div:hover {
        border-color: rgba(140, 70, 255, 0.55);
        transform: scale(1.01);
      }

      body.dashboard div iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      body.dashboard div a {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: block;
      }

      body.dashboard div a:after {
        display: none;
      }
    </style>
  </head>
  
  <body class="dashboard">
    <a class="logo2" href="index.html"></a>

    <div>
      <a href="analytics/1/1.html"></a>
      <iframe src="img/1/1-1-img.html" allowtransparency="true"></iframe>
    </div>
    
    <div>
      <a href="analytics/1/2.html"></a>
      <iframe src="img/1/2-1-img.html" allowtransparency="true"></iframe>
    </div>
    
    <div>
      <a href="analytics/1/3.html"></a>
      <iframe src="img/1/3-1-img.html" allowtransparency="true"></iframe>
    </div>
    
    <div>
      <a href="analytics/1/4.html"></a>
      <iframe src="img/1/4-1-img.html" allowtransparency="true"></iframe>
    </div>
    
    <div>
      <a href="analytics/1/5.html"></a>
      <iframe src="img/1/5-1-img.html" allowtransparency="true"></iframe>
    </div>
    
    <div>
      <a href="analytics/1/6.html"></a>
      <iframe src="img/1/6-1-img.html" allowtransparency="true"></iframe>
    </div>
  </body>  
</html>
